[transport]
transport = "tcp"
host = "127.0.0.1"
port = 5760
heartbeat_timeout_sec = 5

# UDP-only options (ignored for tcp):
# bind_host = "0.0.0.0"
# bind_port = 0

[download]
delay_after_disarm = 2
download_timeout = 5
retry_count = 3
retry_delay = 2
probe_bytes = 51200
verify_after_download = true
erase_after_success = true

[storage]
directory = "/var/lib/mcls"
max_size_gb = 1

[logging]
verbose = true
# file = "/var/log/mcls/mcls.log"
