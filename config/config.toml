[transport]
transport = "tcp"
host = "127.0.0.1"
port = 5760
heartbeat_timeout_sec = 5

# UDP-only options (ignored for tcp):
# bind_host = "0.0.0.0"
# bind_port = 0

[download]
delay_after_disarm = 2
download_timeout = 5
retry_count = 3
retry_delay = 2
probe_bytes = 51200
verify_after_download = true
erase_after_success = true

stall_abort_attempts = 3
max_queued_log_data = 2048
reconnect_on_transport_failure = true
reconnect_after_consecutive_failures = 3

gap_fill_idle_ms = 500
verify_dataflash_parse = true
verify_max_bad_header_ratio = 0.001
detect_overlap_conflict = true
verify_fc_reread = "sample"
verify_fc_reread_sample_count = 64
benchmark_download = false

[storage]
directory = "/var/lib/mcls"
max_size_gb = 1

[logging]
verbose = true
# file = "/var/log/mcls/mcls.log"

# Companion control API (optional, for Android WFB companion stream)
# Exposes status + archive start/cancel over localhost UDP on port 14541.
# wfb-ng companion stream (0x40/0xc0) forwards to/from port 14540.
# [companion]
# enabled = false
# bind_host = "127.0.0.1"
# bind_port = 14541
# send_host = "127.0.0.1"
# send_port = 14540
# token = ""                    # empty = no auth; set for production
# max_request_bytes = 2048
# max_response_bytes = 1200
# max_fc_logs_per_response = 8
# udp_proxy_keepalive_ms = 5000  # opaque 1-byte keepalive to keep wfb-ng listen:// reply addr registered; 0 disables
