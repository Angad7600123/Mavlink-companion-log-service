[transport]
transport = "tcp"
host = "127.0.0.1"
port = 5760
heartbeat_timeout_sec = 5

# UDP-only options (ignored for tcp):
# bind_host = "0.0.0.0"
# bind_port = 0

[download]
delay_after_disarm = 2
download_timeout = 5
retry_count = 3
retry_delay = 2
probe_bytes = 51200
verify_after_download = true
erase_after_success = true

# Abort a log if the byte offset does not advance after this many attempts.
stall_abort_attempts = 3
# Max queued LOG_DATA chunks before dropping oldest (bounds memory).
max_queued_log_data = 256
# Reconnect the transport immediately on transport-class failures.
reconnect_on_transport_failure = true
# Reconnect after this many consecutive failed cycles (0 = disabled).
reconnect_after_consecutive_failures = 3

[storage]
directory = "/var/lib/mcls"
max_size_gb = 1

[logging]
verbose = true
# file = "/var/log/mcls/mcls.log"
